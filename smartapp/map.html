<!DOCTYPE html>
<html>
<head>
    <title>Service Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 500px;
            width: 100%;
        }
    </style>
</head>
<body>

<h2>Service Location Map</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([19.455, 72.811], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    fetch('http://localhost:8080/api/service/all')
        .then(function(response) {
            return response.json();
        })
        .then(function(data) {
            if (!data || data.length === 0) {
                alert("No service requests found");
                return;
            }

            var bounds = [];

            data.forEach(function(item) {
                if (item.latitude != null && item.longitude != null) {
                    var marker = L.marker([item.latitude, item.longitude]).addTo(map)
                        .bindPopup(
                            "Service: " + item.serviceType + "<br>" +
                            "Location: " + item.location + "<br>" +
                            "Status: " + item.status + "<br>" +
                            "Latitude: " + item.latitude + "<br>" +
                            "Longitude: " + item.longitude
                        );

                    bounds.push([item.latitude, item.longitude]);
                }
            });

            if (bounds.length > 0) {
                map.fitBounds(bounds);
            }
        })
        .catch(function(error) {
            console.log("Fetch Error:", error);
            alert("Could not load API data");
        });
</script>

</body>
</html>
