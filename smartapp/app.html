<!DOCTYPE html>
<html>
<head>
    <title>Service App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h2 {
            margin-top: 30px;
        }

        input {
            margin: 5px;
            padding: 8px;
            width: 180px;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }

        .section {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .request-item, .provider-item {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .pending {
            background-color: #fff8dc;
        }

        .accepted {
            background-color: #e6f7ff;
        }

        .completed {
            background-color: #e8f5e9;
        }

        .available {
            background-color: #e8f5e9;
        }

        .busy {
            background-color: #ffeaea;
        }
    </style>
</head>
<body>

<h1>Smart Local Service App</h1>

<div class="section">
    <h2>Create Service Request</h2>
    <input id="serviceType" placeholder="Service Type">
    <input id="location" placeholder="Location">
    <input id="lat" placeholder="Latitude">
    <input id="lng" placeholder="Longitude">
    <button onclick="createRequest()">Create</button>
</div>

<div class="section">
    <h2>Requests</h2>
    <button onclick="loadRequests()">Load Requests</button>

    <h3>Pending Requests</h3>
    <div id="pendingList"></div>

    <h3>Accepted Requests</h3>
    <div id="acceptedList"></div>

    <h3>Completed Requests</h3>
    <div id="completedList"></div>
</div>

<div class="section">
    <h2>Providers</h2>
    <button onclick="loadProviders()">Load Providers</button>

    <h3>Available Providers</h3>
    <div id="availableProviders"></div>

    <h3>Busy Providers</h3>
    <div id="busyProviders"></div>
</div>

<script>
    function createRequest() {
        fetch('http://localhost:8080/api/service/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                serviceType: document.getElementById('serviceType').value,
                location: document.getElementById('location').value,
                latitude: parseFloat(document.getElementById('lat').value),
                longitude: parseFloat(document.getElementById('lng').value)
            })
        })
            .then(function(response) {
                return response.json();
            })
            .then(function() {
                alert("Request created successfully");
                loadRequests();
            });
    }

    function loadRequests() {
        fetch('http://localhost:8080/api/service/all')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                document.getElementById('pendingList').innerHTML = "";
                document.getElementById('acceptedList').innerHTML = "";
                document.getElementById('completedList').innerHTML = "";

                data.forEach(function(r) {
                    let div = document.createElement('div');

                    let cssClass = "request-item";
                    let targetList = null;

                    if (r.status === "PENDING") {
                        cssClass += " pending";
                        targetList = document.getElementById('pendingList');
                    } else if (r.status === "ACCEPTED") {
                        cssClass += " accepted";
                        targetList = document.getElementById('acceptedList');
                    } else if (r.status === "COMPLETED") {
                        cssClass += " completed";
                        targetList = document.getElementById('completedList');
                    }

                    div.className = cssClass;

                    div.innerHTML =
                        "<b>ID:</b> " + r.id + "<br>" +
                        "<b>Service:</b> " + r.serviceType + "<br>" +
                        "<b>Location:</b> " + r.location + "<br>" +
                        "<b>Status:</b> " + r.status + "<br>" +
                        "<b>Provider ID:</b> " + (r.providerId !== null ? r.providerId : "Not Assigned") + "<br>" +
                        "<button onclick='accept(" + r.id + ")'>Accept</button>" +
                        "<button onclick='completeRequest(" + r.id + ")'>Complete</button>";

                    targetList.appendChild(div);
                });
            });
    }

    function loadProviders() {
        fetch('http://localhost:8080/api/provider/all')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                document.getElementById('availableProviders').innerHTML = "";
                document.getElementById('busyProviders').innerHTML = "";

                data.forEach(function(p) {
                    let div = document.createElement('div');
                    let cssClass = "provider-item";
                    let targetList = null;

                    if (p.status === "AVAILABLE") {
                        cssClass += " available";
                        targetList = document.getElementById('availableProviders');
                    } else {
                        cssClass += " busy";
                        targetList = document.getElementById('busyProviders');
                    }

                    div.className = cssClass;

                    div.innerHTML =
                        "<b>ID:</b> " + p.id + "<br>" +
                        "<b>Name:</b> " + p.name + "<br>" +
                        "<b>Service:</b> " + p.serviceType + "<br>" +
                        "<b>Phone:</b> " + p.phone + "<br>" +
                        "<b>Status:</b> " + p.status;

                    targetList.appendChild(div);
                });
            });
    }

    function accept(id) {
        fetch('http://localhost:8080/api/service/auto-assign/' + id, {
            method: 'PUT'
        }).then(function() {
            loadRequests();
            loadProviders();
        });
    }

    function completeRequest(id) {
        fetch('http://localhost:8080/api/service/complete/' + id, {
            method: 'PUT'
        }).then(function() {
            loadRequests();
            loadProviders();
        });
    }
</script>

</body>
</html>
