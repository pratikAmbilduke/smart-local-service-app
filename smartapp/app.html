<!DOCTYPE html>
<html>
<head>
    <title>Service App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1, h2, h3 {
            margin-top: 20px;
        }

        input, select {
            margin: 5px;
            padding: 8px;
            width: 180px;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }

        .section {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .request-item, .provider-item {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .pending {
            background-color: #fff8dc;
        }

        .accepted {
            background-color: #e6f7ff;
        }

        .completed {
            background-color: #e8f5e9;
        }

        .available {
            background-color: #e8f5e9;
        }

        .busy {
            background-color: #ffeaea;
        }

        .dashboard {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .card {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            min-width: 140px;
            text-align: center;
            background-color: #f9f9f9;
        }

        .card h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
        }

        .card p {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Smart Local Service App</h1>

<div class="section">
    <h2>Dashboard</h2>
    <button onclick="loadDashboard()">Load Dashboard</button>

    <div class="dashboard">
        <div class="card"><h3>Total Requests</h3><p id="totalRequests">0</p></div>
        <div class="card"><h3>Pending</h3><p id="pendingCount">0</p></div>
        <div class="card"><h3>Accepted</h3><p id="acceptedCount">0</p></div>
        <div class="card"><h3>Completed</h3><p id="completedCount">0</p></div>
        <div class="card"><h3>Available Providers</h3><p id="availableCount">0</p></div>
        <div class="card"><h3>Busy Providers</h3><p id="busyCount">0</p></div>
    </div>
</div>

<div class="section">
    <h2>Create Service Request</h2>
    <select id="serviceType">
        <option value="">Select Service Type</option>
        <option value="Plumber">Plumber</option>
        <option value="Electrician">Electrician</option>
        <option value="Cleaner">Cleaner</option>
        <option value="AC Repair">AC Repair</option>
    </select>
    <input id="location" placeholder="Location">
    <input id="lat" placeholder="Latitude">
    <input id="lng" placeholder="Longitude">
    <button onclick="createRequest()">Create</button>
</div>

<div class="section">
    <h2>Create Provider</h2>
    <input id="providerName" placeholder="Provider Name">
    <select id="providerServiceType">
        <option value="">Select Service Type</option>
        <option value="Plumber">Plumber</option>
        <option value="Electrician">Electrician</option>
        <option value="Cleaner">Cleaner</option>
        <option value="AC Repair">AC Repair</option>
    </select>
    <input id="providerPhone" placeholder="Phone">
    <select id="providerStatus">
        <option value="">Select Status</option>
        <option value="AVAILABLE">AVAILABLE</option>
        <option value="BUSY">BUSY</option>
    </select>
    <button onclick="createProvider()">Create Provider</button>
</div>

<div class="section">
    <h2>Requests</h2>
    <button onclick="loadRequests()">Load Requests</button>

    <h3>Pending Requests</h3>
    <div id="pendingList"></div>

    <h3>Accepted Requests</h3>
    <div id="acceptedList"></div>

    <h3>Completed Requests</h3>
    <div id="completedList"></div>
</div>

<div class="section">
    <h2>Providers</h2>
    <button onclick="loadProviders()">Load Providers</button>

    <h3>Available Providers</h3>
    <div id="availableProviders"></div>

    <h3>Busy Providers</h3>
    <div id="busyProviders"></div>
</div>

<script>
    function createRequest() {
        var serviceType = document.getElementById('serviceType').value.trim();
        var location = document.getElementById('location').value.trim();
        var latitude = document.getElementById('lat').value.trim();
        var longitude = document.getElementById('lng').value.trim();

        if (serviceType === "" || location === "" || latitude === "" || longitude === "") {
            alert("Please fill all request fields");
            return;
        }

        fetch('http://localhost:8080/api/service/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                serviceType: serviceType,
                location: location,
                latitude: parseFloat(latitude),
                longitude: parseFloat(longitude)
            })
        })
            .then(function(response) {
                return response.json();
            })
            .then(function() {
                alert("Request created successfully");

                document.getElementById('serviceType').value = "";
                document.getElementById('location').value = "";
                document.getElementById('lat').value = "";
                document.getElementById('lng').value = "";

                loadRequests();
                loadDashboard();
            })
            .catch(function(error) {
                console.log(error);
                alert("Request creation failed");
            });
    }

    function createProvider() {
        var providerName = document.getElementById('providerName').value.trim();
        var providerServiceType = document.getElementById('providerServiceType').value.trim();
        var providerPhone = document.getElementById('providerPhone').value.trim();
        var providerStatus = document.getElementById('providerStatus').value.trim();

        if (providerName === "" || providerServiceType === "" || providerPhone === "" || providerStatus === "") {
            alert("Please fill all provider fields");
            return;
        }

        fetch('http://localhost:8080/api/provider/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: providerName,
                serviceType: providerServiceType,
                phone: providerPhone,
                status: providerStatus
            })
        })
            .then(function(response) {
                return response.json();
            })
            .then(function() {
                alert("Provider created successfully");

                document.getElementById('providerName').value = "";
                document.getElementById('providerServiceType').value = "";
                document.getElementById('providerPhone').value = "";
                document.getElementById('providerStatus').value = "";

                loadProviders();
                loadDashboard();
            })
            .catch(function(error) {
                console.log(error);
                alert("Provider creation failed");
            });
    }

    function loadRequests() {
        fetch('http://localhost:8080/api/service/all')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                document.getElementById('pendingList').innerHTML = "";
                document.getElementById('acceptedList').innerHTML = "";
                document.getElementById('completedList').innerHTML = "";

                data.forEach(function(r) {
                    var div = document.createElement('div');
                    var cssClass = "request-item";
                    var targetList = null;

                    if (r.status === "PENDING") {
                        cssClass += " pending";
                        targetList = document.getElementById('pendingList');
                    } else if (r.status === "ACCEPTED") {
                        cssClass += " accepted";
                        targetList = document.getElementById('acceptedList');
                    } else if (r.status === "COMPLETED") {
                        cssClass += " completed";
                        targetList = document.getElementById('completedList');
                    }

                    div.className = cssClass;
                    div.innerHTML =
                        "<b>ID:</b> " + r.id + "<br>" +
                        "<b>Service:</b> " + r.serviceType + "<br>" +
                        "<b>Location:</b> " + r.location + "<br>" +
                        "<b>Status:</b> " + r.status + "<br>" +
                        "<b>Provider ID:</b> " + (r.providerId !== null ? r.providerId : "Not Assigned") + "<br>" +
                        "<button onclick='acceptRequest(" + r.id + ")'>Accept</button>" +
                        "<button onclick='completeRequest(" + r.id + ")'>Complete</button>";


                    if (targetList) {
                        targetList.appendChild(div);
                    }
                });

                document.getElementById('totalRequests').innerText = data.length;
            })
            .catch(function(error) {
                console.log(error);
                alert("Loading requests failed");
            });
    }

    function loadProviders() {
        fetch('http://localhost:8080/api/provider/all')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                document.getElementById('availableProviders').innerHTML = "";
                document.getElementById('busyProviders').innerHTML = "";

                var available = 0;
                var busy = 0;

                data.forEach(function(p) {
                    var div = document.createElement('div');
                    var cssClass = "provider-item";
                    var targetList = null;

                    if (p.status === "AVAILABLE") {
                        cssClass += " available";
                        targetList = document.getElementById('availableProviders');
                        available++;
                    } else {
                        cssClass += " busy";
                        targetList = document.getElementById('busyProviders');
                        busy++;
                    }

                    div.className = cssClass;
                    div.innerHTML =
                        "<b>ID:</b> " + p.id + "<br>" +
                        "<b>Name:</b> " + p.name + "<br>" +
                        "<b>Service:</b> " + p.serviceType + "<br>" +
                        "<b>Phone:</b> " + p.phone + "<br>" +
                        "<b>Status:</b> " + p.status + "<br>" +
                        "<button onclick='deleteProvider(" + p.id + ")'>Delete</button>";

                    if (targetList) {
                        targetList.appendChild(div);
                    }
                });

                document.getElementById('availableCount').innerText = available;
                document.getElementById('busyCount').innerText = busy;
            })
            .catch(function(error) {
                console.log(error);
                alert("Loading providers failed");
            });
    }

    function loadDashboard() {
        fetch('http://localhost:8080/api/service/count')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                document.getElementById('pendingCount').innerText = data.PENDING || 0;
                document.getElementById('acceptedCount').innerText = data.ACCEPTED || 0;
                document.getElementById('completedCount').innerText = data.COMPLETED || 0;
            })
            .catch(function(error) {
                console.log(error);
            });

        fetch('http://localhost:8080/api/service/all')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                document.getElementById('totalRequests').innerText = data.length;
            })
            .catch(function(error) {
                console.log(error);
            });

        fetch('http://localhost:8080/api/provider/all')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                var available = 0;
                var busy = 0;

                data.forEach(function(p) {
                    if (p.status === "AVAILABLE") {
                        available++;
                    } else {
                        busy++;
                    }
                });

                document.getElementById('availableCount').innerText = available;
                document.getElementById('busyCount').innerText = busy;
            })
            .catch(function(error) {
                console.log(error);
            });
    }

    function acceptRequest(id) {
        fetch('http://localhost:8080/api/service/auto-assign/' + id, {
            method: 'PUT'
        })
            .then(function() {
                loadRequests();
                loadProviders();
                loadDashboard();
            })
            .catch(function(error) {
                console.log(error);
                alert("Accept request failed");
            });
    }

    function completeRequest(id) {
        fetch('http://localhost:8080/api/service/complete/' + id, {
            method: 'PUT'
        })
            .then(function() {
                loadRequests();
                loadProviders();
                loadDashboard();
            })
            .catch(function(error) {
                console.log(error);
                alert("Complete request failed");
            });
    }

    function deleteRequest(id) {
        if (!confirm("Are you sure you want to delete this request?")) {
            return;
        }

        fetch('http://localhost:8080/api/service/delete/' + id, {
            method: 'DELETE'
        })
            .then(function() {
                loadRequests();
                loadDashboard();
            })
            .catch(function(error) {
                console.log(error);
                alert("Delete request failed");
            });
    }

    function deleteProvider(id) {
        if (!confirm("Are you sure you want to delete this provider?")) {
            return;
        }

        fetch('http://localhost:8080/api/provider/delete/' + id, {
            method: 'DELETE'
        })
            .then(function() {
                loadProviders();
                loadDashboard();
            })
            .catch(function(error) {
                console.log(error);
                alert("Delete provider failed");
            });
    }

    window.onload = function() {
        loadDashboard();
        loadRequests();
        loadProviders();
    };

</script>

</body>
</html>
